name: Route 53 DDNS
version: "1.0.0"
slug: route53_ddns
description: Dynamic DNS updater for AWS Route 53 using boto3
arch:
  - aarch64
  - amd64
init: false
boot: auto
startup: services
options:
  aws_access_key_id: ""
  aws_secret_access_key: ""
  aws_region: eu-central-1
  hosted_zone_id: ""
  domain: home.example.com
  ttl: 300
  check_interval: 300
  ip_check_url: https://api.ipify.org
schema:
  aws_access_key_id: str
  aws_secret_access_key: password
  aws_region: str
  hosted_zone_id: str
  domain: str
  ttl: int
  check_interval: int
  ip_check_url: str
